<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Mahi's Python Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════
   TOKENS — iPad 12.9" (820px max)
═══════════════════════════════ */
:root{
  --brand:#7c3aed; --brand-dark:#5b21b6; --brand-light:#ede9fe; --brand-mid:#a78bfa;
  --gold:#f59e0b;  --gold-light:#fef3c7; --gold-dark:#92400e;
  --green:#059669; --green-light:#d1fae5; --green-dark:#064e3b;
  --red:#dc2626;   --red-light:#fee2e2;
  --sky:#0ea5e9;   --sky-light:#e0f2fe;
  --g0:#f8fafc; --g1:#f1f5f9; --g2:#e2e8f0; --g3:#cbd5e1;
  --g5:#64748b; --g6:#475569; --g7:#334155; --g8:#1e293b; --g9:#0f172a;
  --white:#ffffff;
  --font:'Nunito','Segoe UI',system-ui,sans-serif;
  --mono:'Fira Code','SF Mono',Consolas,monospace;
  --radius:14px; --radius-lg:20px; --radius-xl:26px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
  --max:820px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--font);background:var(--g0);color:var(--g8);min-height:100vh;-webkit-font-smoothing:antialiased}
#app{max-width:var(--max);margin:0 auto;padding-bottom:96px}

/* ── TOP BAR ── */
.topbar{
  background:linear-gradient(135deg,var(--g9) 0%,#1e1b4b 50%,var(--brand-dark) 100%);
  padding:16px 24px 12px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 4px 20px rgba(0,0,0,0.30);
}
.topbar-inner{max-width:var(--max);margin:0 auto}
.topbar-row1{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{
  width:42px;height:42px;border-radius:13px;
  background:linear-gradient(135deg,#4ade80,#22c55e);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
  box-shadow:0 2px 10px rgba(74,222,128,0.40);
  flex-shrink:0;
}
.brand-text h1{
  font-size:20px;font-weight:900;color:var(--white);
  letter-spacing:-0.4px;line-height:1.1;
}
.brand-text .sub{font-size:10px;color:rgba(255,255,255,0.55);font-weight:700;letter-spacing:0.8px;text-transform:uppercase}
.topbar-stats{display:flex;gap:8px;margin-left:auto;flex-shrink:0}
.tstat{
  background:rgba(255,255,255,0.11);border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;padding:5px 12px;text-align:center;min-width:58px;
}
.tstat .tv{display:block;font-size:17px;font-weight:900;color:var(--white);line-height:1.1}
.tstat .tl{font-size:9px;color:rgba(255,255,255,0.55);font-weight:700;letter-spacing:0.6px;text-transform:uppercase}
.xp-track{height:5px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--gold),#fde68a);border-radius:3px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}

/* ── BOTTOM NAV ── */
.bnav-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:var(--max);
  background:rgba(255,255,255,0.97);
  border-top:1px solid var(--g2);
  display:grid;grid-template-columns:repeat(4,1fr);
  z-index:200;
  padding-bottom:env(safe-area-inset-bottom);
  backdrop-filter:blur(16px);
  box-shadow:0 -4px 20px rgba(0,0,0,0.08);
}
.nb{
  border:none;background:none;padding:12px 4px 10px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:all .18s;color:var(--g3);font-family:var(--font);
}
.nb.active{color:var(--brand)}
.nb .ni{font-size:24px;line-height:1;transition:transform .2s}
.nb .nl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px}
.nb.active .ni{transform:scale(1.1);filter:drop-shadow(0 0 6px rgba(124,58,237,.40))}

/* ── SECTIONS ── */
.sec{display:none}.sec.on{display:block}

/* ══════════════════════════════════
   HOME / PLAN
══════════════════════════════════ */
.plan-hero{
  background:linear-gradient(145deg,var(--g9),#1e1b4b 40%,var(--brand-dark));
  padding:36px 28px 0;position:relative;overflow:hidden;
}
.plan-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 80% 20%,rgba(124,58,237,.20) 0%,transparent 60%);
  pointer-events:none;
}
.ph-label{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.ph-title{
  font-size:36px;font-weight:900;color:var(--white);
  line-height:1.15;letter-spacing:-0.8px;margin-bottom:8px;
}
.ph-title .accent{
  background:linear-gradient(90deg,#a78bfa,#c4b5fd);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.ph-desc{font-size:15px;color:rgba(255,255,255,.70);line-height:1.6;margin-bottom:22px;font-weight:500;max-width:500px}
.ph-stats{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.ph-stat{
  background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);
  border-radius:var(--radius);padding:14px 18px;flex:1;min-width:100px;
  backdrop-filter:blur(6px);
}
.ph-stat .psv{display:block;font-size:28px;font-weight:900;color:var(--white);line-height:1;margin-bottom:3px}
.ph-stat .psl{font-size:11px;font-weight:700;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:0.6px}
.ph-prog{
  background:rgba(0,0,0,.20);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  padding:16px 24px;display:flex;align-items:center;gap:14px;margin:0 -28px;
}
.ph-prog-label{font-size:13px;font-weight:800;color:rgba(255,255,255,.75);white-space:nowrap}
.ph-bar-wrap{flex:1;background:rgba(255,255,255,.15);height:10px;border-radius:5px;overflow:hidden}
.ph-bar{height:100%;background:linear-gradient(90deg,var(--gold),#fde68a);border-radius:5px;transition:width 1s ease;position:relative}
.ph-bar::after{content:'';position:absolute;right:0;top:0;bottom:0;width:12px;background:rgba(255,255,255,.35);border-radius:0 5px 5px 0}
.ph-prog-pct{font-size:15px;font-weight:900;color:var(--gold);white-space:nowrap}

/* today card */
.plan-body{padding:22px 24px}
.section-eyebrow{
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--brand);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.section-eyebrow::after{content:'';flex:1;height:1.5px;background:linear-gradient(90deg,var(--brand-light),transparent);border-radius:1px}

.today-card{
  background:linear-gradient(135deg,var(--brand),var(--brand-dark));
  border-radius:var(--radius-lg);padding:22px;margin-bottom:20px;
  cursor:pointer;box-shadow:0 8px 28px rgba(124,58,237,.32);
  transition:all .22s;position:relative;overflow:hidden;
}
.today-card::after{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:rgba(255,255,255,.05);border-radius:50%}
.today-card:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(124,58,237,.40)}
.tc-tag{font-size:10px;font-weight:800;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.tc-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.tc-emoji{font-size:42px;display:block;margin-bottom:10px}
.tc-title{font-size:24px;font-weight:900;color:var(--white);line-height:1.2;margin-bottom:6px}
.tc-level{font-size:13px;color:rgba(255,255,255,.70);margin-bottom:14px;font-weight:600}
.tc-footer{display:flex;gap:8px;align-items:center}
.tc-pill{background:rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:rgba(255,255,255,.90)}
.tc-arrow{margin-left:auto;width:36px;height:36px;background:rgba(255,255,255,.18);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff}

/* stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.sg{background:var(--white);border:1.5px solid var(--g2);border-radius:var(--radius);padding:14px 10px;text-align:center;transition:all .18s}
.sg:hover{border-color:var(--brand-mid);box-shadow:var(--shadow)}
.sg-icon{font-size:22px;margin-bottom:6px}
.sg-val{display:block;font-size:22px;font-weight:900;color:var(--g9);line-height:1;margin-bottom:3px}
.sg-lbl{font-size:10px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.5px}

/* day list */
.week-eyebrow{
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--brand);margin:18px 0 10px;
  display:flex;align-items:center;gap:8px;
}
.week-eyebrow::after{content:'';flex:1;height:1.5px;background:linear-gradient(90deg,var(--brand-light),transparent)}
.day-card{
  background:var(--white);border:1.5px solid var(--g2);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:8px;cursor:pointer;
  transition:all .18s;display:flex;align-items:center;gap:14px;
}
.day-card:hover{border-color:var(--brand-mid);transform:translateX(2px);box-shadow:var(--shadow)}
.day-card.done{border-color:var(--green);background:linear-gradient(135deg,#f0fdf4,#dcfce7)}
.day-card.today-day{border-color:var(--brand);background:var(--brand-light);box-shadow:0 0 0 3px rgba(124,58,237,.12)}
.day-card.locked{opacity:.40;cursor:not-allowed}
.dc-icon{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.dc-info{flex:1;min-width:0}
.dc-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.dc-num{font-size:10px;font-weight:800;color:var(--brand);text-transform:uppercase;letter-spacing:.5px}
.dc-lvl{font-size:10px;font-weight:700;color:var(--g5);background:var(--g1);border-radius:6px;padding:2px 7px}
.dc-title{font-size:14px;font-weight:800;color:var(--g9);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dc-sub{font-size:11px;color:var(--g5);font-weight:600}
.dc-status{font-size:20px;flex-shrink:0}

/* ══════════════════════════════════
   LESSON VIEW
══════════════════════════════════ */
.lesson-hero{padding:24px 24px 20px;position:relative;overflow:hidden}
.lesson-hero::before{content:'';position:absolute;inset:0;background:rgba(0,0,0,.18);pointer-events:none}
.lesson-hero>*{position:relative}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  border-radius:10px;padding:8px 14px;
  font-family:var(--font);font-size:13px;font-weight:700;color:#fff;
  cursor:pointer;margin-bottom:18px;backdrop-filter:blur(8px);transition:background .15s;
}
.back-btn:hover{background:rgba(255,255,255,.22)}
.lesson-emoji{font-size:48px;display:block;margin-bottom:10px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.25))}
.lesson-hero h2{font-size:28px;font-weight:900;color:var(--white);line-height:1.2;letter-spacing:-.5px;margin-bottom:6px}
.lesson-obj{font-size:14px;font-weight:600;color:rgba(255,255,255,.78);line-height:1.5}

.lesson-body{padding:22px 24px}
.lesson-intro{
  background:var(--brand-light);border-left:4px solid var(--brand);
  border-radius:0 var(--radius) var(--radius) 0;
  padding:14px 16px;font-size:14px;line-height:1.75;color:var(--g7);margin-bottom:16px;
}
.concept-section{
  background:var(--white);border-radius:var(--radius);border:1.5px solid var(--g2);
  margin-bottom:10px;overflow:hidden;transition:border-color .15s;
}
.concept-section.open-s{border-color:var(--brand-mid)}
.cs-head{
  padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;
  background:var(--white);user-select:none;
}
.cs-icon{width:36px;height:36px;border-radius:10px;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cs-head h3{font-size:14px;font-weight:800;color:var(--g8);flex:1}
.cs-chev{font-size:12px;color:var(--g5);transition:transform .22s}
.cs-head.cs-open .cs-chev{transform:rotate(180deg)}
.cs-body{padding:0 16px 16px;display:none}
.cs-body.cs-open{display:block}
.cs-body p{font-size:13px;line-height:1.75;color:var(--g7);margin-bottom:10px}
.example-box{
  background:linear-gradient(135deg,#f0f9ff,#e0f2fe);
  border-left:3px solid var(--sky);border-radius:0 var(--radius-sm, 10px) var(--radius-sm, 10px) 0;
  padding:12px 14px;font-family:var(--mono);font-size:13px;color:#0c4a6e;
  line-height:1.85;white-space:pre-wrap;word-break:break-word;
}

/* code demo */
.code-demo{
  background:#0f172a;border-radius:var(--radius);padding:16px;margin:12px 0;
  font-family:var(--mono);font-size:13px;color:#e2e8f0;
  white-space:pre;overflow-x:auto;line-height:1.7;
  border:1px solid rgba(255,255,255,.06);
}

/* editor */
.editor-label{
  font-size:12px;font-weight:800;color:var(--g6);
  display:block;margin:16px 0 6px;text-transform:uppercase;letter-spacing:.6px;
}
.code-editor{
  width:100%;font-family:var(--mono);font-size:13px;
  border:2px solid var(--g2);border-radius:var(--radius);
  padding:14px;background:var(--white);color:var(--g8);
  resize:vertical;min-height:130px;line-height:1.65;
  transition:border-color .15s;
}
.code-editor:focus{outline:none;border-color:var(--brand)}
.run-area{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.btn-run{
  background:linear-gradient(135deg,var(--brand),var(--brand-dark));
  color:var(--white);border:none;border-radius:var(--radius);
  padding:10px 20px;font-size:14px;font-weight:800;
  cursor:pointer;font-family:var(--font);
  box-shadow:0 4px 14px rgba(124,58,237,.30);transition:all .2s;
}
.btn-run:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(124,58,237,.40)}
.btn-secondary{
  background:var(--white);border:2px solid var(--g2);border-radius:var(--radius);
  padding:10px 14px;font-size:13px;font-weight:700;color:var(--g7);
  cursor:pointer;font-family:var(--font);transition:all .18s;
}
.btn-secondary:hover{border-color:var(--brand-mid);background:var(--brand-light);color:var(--brand)}
.btn-done{
  background:linear-gradient(135deg,var(--green),#10b981);
  color:var(--white);border:none;border-radius:var(--radius);
  padding:10px 16px;font-size:13px;font-weight:800;
  cursor:pointer;font-family:var(--font);
  box-shadow:0 4px 12px rgba(5,150,105,.28);transition:all .2s;
}
.btn-done:hover{transform:translateY(-1px)}
.completed-tag{font-size:14px;font-weight:800;color:var(--green);align-self:center}
.output-box{
  background:var(--g0);border:2px solid var(--g2);border-radius:var(--radius);
  padding:12px 14px;font-family:var(--mono);font-size:13px;
  margin-top:10px;min-height:44px;color:var(--g8);
  white-space:pre-wrap;line-height:1.65;display:none;
}
.output-box.ok{border-color:var(--green);background:var(--green-light);color:var(--green-dark)}
.output-box.err{border-color:var(--red);background:var(--red-light);color:var(--red)}
.quiz-launch{
  margin-top:18px;padding-top:16px;border-top:1.5px solid var(--g2);
}
.btn-quiz-launch{
  width:100%;background:linear-gradient(135deg,var(--brand),var(--brand-dark));
  color:var(--white);border:none;border-radius:var(--radius);
  padding:15px;font-size:16px;font-weight:800;cursor:pointer;font-family:var(--font);
  box-shadow:0 6px 20px rgba(124,58,237,.30);transition:all .22s;letter-spacing:.3px;
}
.btn-quiz-launch:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(124,58,237,.40)}

/* ══════════════════════════════════
   QUIZ
══════════════════════════════════ */
.quiz-topbar{
  background:var(--white);border-bottom:1.5px solid var(--g2);
  padding:12px 20px;display:flex;align-items:center;gap:12px;
}
.quiz-back-btn{
  background:var(--g1);border:none;border-radius:10px;
  padding:7px 12px;font-size:13px;font-weight:700;color:var(--g7);
  cursor:pointer;font-family:var(--font);white-space:nowrap;
}
.quiz-counter{font-size:13px;font-weight:700;color:var(--g6);flex:1;
  font-family:var(--font);}
.quiz-score-pill{
  background:var(--brand-light);color:var(--brand);
  border-radius:20px;padding:4px 12px;
  font-size:12px;font-weight:800;white-space:nowrap;font-family:var(--font);
}
.quiz-progress-bar{height:5px;background:var(--g2);overflow:hidden}
.quiz-progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--brand),var(--brand-mid),var(--gold));
  transition:width .4s ease;
}
.quiz-body{padding:22px 24px}
.quiz-question{
  font-size:18px;font-weight:800;color:var(--g9);
  line-height:1.55;margin-bottom:18px;min-height:56px;
}
.quiz-question code{
  background:var(--g1);padding:2px 7px;border-radius:6px;
  font-family:var(--mono);font-size:15px;color:var(--g8);
}
.opts-list{display:flex;flex-direction:column;gap:9px}
.opt-btn{
  background:var(--white);border:2px solid var(--g2);border-radius:var(--radius);
  padding:14px 18px;font-size:14px;font-weight:600;color:var(--g8);
  cursor:pointer;text-align:left;transition:all .15s;
  display:flex;align-items:center;gap:12px;line-height:1.4;font-family:var(--font);
}
.opt-btn:hover:not(:disabled){border-color:var(--brand-mid);background:var(--brand-light);transform:translateX(3px)}
.opt-btn.correct{border-color:var(--green)!important;background:var(--green-light)!important;color:var(--green-dark)!important;font-weight:700}
.opt-btn.wrong{border-color:var(--red)!important;background:var(--red-light)!important;color:#9f1239!important}
.opt-btn.highlight{border-color:var(--green)!important;background:var(--green-light)!important;color:var(--green-dark)!important;font-weight:700;animation:highlightPulse .5s ease}
@keyframes highlightPulse{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
.opt-btn:disabled{cursor:default}
.opt-letter{
  width:30px;height:30px;border-radius:9px;background:var(--g1);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;flex-shrink:0;transition:all .15s;color:var(--g6);font-family:var(--font);
}
.opt-btn:hover:not(:disabled) .opt-letter{background:var(--brand);color:var(--white)}
.opt-btn.correct .opt-letter{background:var(--green);color:var(--white)}
.opt-btn.wrong .opt-letter{background:var(--red);color:var(--white)}
.opt-btn.highlight .opt-letter{background:var(--green);color:var(--white)}
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.feedback-box{border-radius:var(--radius);padding:14px 16px;margin-top:12px;font-size:14px;line-height:1.65;display:none;font-weight:500}
.feedback-box.ok{background:var(--green-light);border:1.5px solid #6ee7b7;color:var(--green-dark);display:block}
.feedback-box.bad{background:var(--gold-light);border:1.5px solid #fcd34d;color:var(--gold-dark);display:block}
.feedback-box strong{font-weight:800}
.next-btn{
  width:100%;background:linear-gradient(135deg,var(--brand),var(--brand-dark));
  color:var(--white);border:none;border-radius:var(--radius);
  padding:15px;font-size:15px;font-weight:800;cursor:pointer;
  margin-top:14px;display:none;font-family:var(--font);
  box-shadow:0 4px 16px rgba(124,58,237,.30);transition:all .22s;letter-spacing:.3px;
}
.next-btn:hover{transform:translateY(-2px)}
.quiz-result-screen{text-align:center;padding:28px 24px}
.quiz-trophy{font-size:80px;margin-bottom:8px;animation:trophyIn .7s ease .1s both}
@keyframes trophyIn{0%{transform:scale(0) rotate(-15deg);opacity:0}65%{transform:scale(1.18) rotate(4deg)}80%{transform:scale(.94) rotate(-2deg)}100%{transform:scale(1) rotate(0)}}
.quiz-stars{font-size:34px;margin:8px 0;letter-spacing:5px;animation:fadeUp .5s ease .4s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.quiz-result-title{
  font-size:28px;font-weight:900;margin-bottom:6px;
  background:linear-gradient(135deg,var(--brand),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:fadeUp .5s ease .5s both;
}
.quiz-result-sub{font-size:15px;color:var(--g5);line-height:1.55;margin-bottom:20px;font-weight:600;animation:fadeUp .5s ease .55s both}
.result-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;animation:fadeUp .5s ease .6s both}
.rs{background:var(--g0);border:1.5px solid var(--g2);border-radius:var(--radius);padding:14px 8px;text-align:center}
.rs-val{font-size:26px;font-weight:900;color:var(--g9);display:block;margin-bottom:3px;font-family:var(--font)}
.rs-lbl{font-size:10px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.5px}
.btn-retry{width:100%;background:var(--white);border:2px solid var(--brand);color:var(--brand);border-radius:var(--radius);padding:13px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:10px;font-family:var(--font);transition:all .18s;animation:fadeUp .5s ease .7s both}
.btn-retry:hover{background:var(--brand-light)}
.btn-next-day{width:100%;background:linear-gradient(135deg,var(--green),#10b981);color:var(--white);border:none;border-radius:var(--radius);padding:15px;font-size:15px;font-weight:800;cursor:pointer;font-family:var(--font);box-shadow:0 4px 16px rgba(5,150,105,.28);transition:all .22s;animation:fadeUp .5s ease .75s both}
.btn-next-day:hover{transform:translateY(-2px)}

/* ══════════════════════════════════
   CHALLENGES
══════════════════════════════════ */
.challenges-wrap{padding:22px 24px}
.chal-card{background:var(--white);border:1.5px solid var(--g2);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.chal-card h3{font-size:15px;font-weight:800;color:var(--g9);margin-bottom:6px}
.chal-card p{font-size:13px;color:var(--g6);line-height:1.65}
.lvl-badge{display:inline-block;font-size:10px;font-weight:800;border-radius:20px;padding:3px 10px;margin-bottom:8px}
.lvl-beg{background:#d1fae5;color:#065f46}
.lvl-int{background:#fef3c7;color:#92400e}
.lvl-adv{background:#fee2e2;color:#9f1239}
.hint-toggle{background:none;border:none;color:var(--brand);font-size:12px;font-weight:800;cursor:pointer;padding:0;margin-top:8px;font-family:var(--font)}
.hint-box{background:var(--brand-light);border:1px solid var(--brand-mid);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:12px;color:var(--brand-dark);display:none;line-height:1.65}
.hint-box a{color:var(--brand)}

/* ══════════════════════════════════
   ASK AI
══════════════════════════════════ */
.ask-wrap{padding:22px 24px}
.ask-hero{background:linear-gradient(135deg,var(--g9),#1e1b4b 50%,var(--brand-dark));border-radius:var(--radius-lg);padding:24px 20px;margin-bottom:18px;text-align:center}
.ask-hero-icon{font-size:44px;margin-bottom:8px}
.ask-hero h2{font-size:22px;font-weight:900;color:var(--white);margin-bottom:4px}
.ask-hero p{font-size:13px;color:rgba(255,255,255,.70);font-weight:600}
.topic-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.topic-chip{
  background:var(--white);border:1.5px solid var(--g2);border-radius:10px;
  padding:9px 8px;font-size:11px;font-weight:800;color:var(--g7);
  cursor:pointer;text-align:center;transition:all .15s;line-height:1.3;font-family:var(--font);
}
.topic-chip:hover{border-color:var(--brand);background:var(--brand-light);color:var(--brand)}
.ask-label{font-size:11px;font-weight:800;color:var(--g6);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.ask-textarea{
  width:100%;border:2px solid var(--g2);border-radius:var(--radius);
  padding:13px 15px;font-family:var(--font);font-size:14px;color:var(--g8);
  resize:none;min-height:80px;background:var(--white);transition:border-color .15s;margin-bottom:10px;
}
.ask-textarea:focus{outline:none;border-color:var(--brand)}
.ask-textarea::placeholder{color:var(--g3)}
.btn-ask{
  width:100%;background:linear-gradient(135deg,var(--brand),var(--brand-dark));
  color:var(--white);border:none;border-radius:var(--radius);
  padding:14px;font-size:15px;font-weight:800;cursor:pointer;
  font-family:var(--font);margin-bottom:12px;
  box-shadow:0 4px 16px rgba(124,58,237,.28);transition:all .22s;
}
.btn-ask:hover{transform:translateY(-1px)}
.ai-response-box{background:var(--brand-light);border:1.5px solid var(--brand-mid);border-radius:var(--radius);padding:16px;display:none}
.ai-label{font-size:10px;font-weight:800;color:var(--brand);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.ai-text{font-size:14px;line-height:1.75;color:var(--g8)}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
.toast{
  position:fixed;top:88px;left:50%;
  transform:translateX(-50%) translateY(-10px);
  background:var(--g9);color:var(--white);
  padding:11px 22px;border-radius:12px;
  font-size:13px;font-weight:700;opacity:0;transition:all .3s;
  pointer-events:none;z-index:999;
  max-width:calc(var(--max) - 48px);text-align:center;
  box-shadow:0 8px 24px rgba(0,0,0,.25);font-family:var(--font);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

rror!\"\nprint(f\"{num1} {op} {num2} = {result}\")", "starter": "# Day 7: Mini Calculator!\nnum1 = 10\nnum2 = 5\nop = \"+\"\nif op == \"+\":\n    result = num1 + num2\nelif op == \"-\":\n    result = num1 - num2\nelif op == \"*\":\n    result = num1 * num2\nelif op == \"/\":\n    if num2 != 0:\n        result = num1 / num2\n    else:\n        result = \"Cannot divide by zero!\"\nprint(f\"{num1} {op} {num2} = {result}\")", "questions": [{"type": "mc", "q": "Which of these correctly shows a multi-step equation being solved?", "opts": ["2x + 5 = 13 → 2x = 8 → x = 4", "2x + 5 = 13 → x = 13/5", "2x + 5 = 13 → 2x = 18 → x = 9", "2x + 5 = 13 → x = 13 - 2"], "ans": 0, "exp": "Step 1: subtract 5 from both sides → 2x = 8. Step 2: divide by 2 → x = 4. Always undo operations in reverse order!"}, {"q": "What is 2 ** 10?", "opts": ["20", "100", "1024", "Error"], "ans": 2, "exp": "2 ** 10 = 1024."}, {"q": "Which correctly embeds a variable in a string?", "opts": ["'Hello ' + {name}", "f'Hello {name}'", "'Hello name'", "format('Hello', name)"], "ans": 1, "exp": "f-strings use f'...' with variable names in curly braces."}, {"q": "age = 13. What does (age >= 13 and age < 18) return?", "opts": ["False", "True", "13", "Error"], "ans": 1, "exp": "13 >= 13 is True AND 13 < 18 is True. True and True = True."}, {"q": "Which operator gives the remainder?", "opts": ["//", "**", "%", "/"], "ans": 2, "exp": "% is modulo — it gives the remainder of division."}]}, {"day": 8, "title": "For loops with range", "level": "beg", "topic": "for-loops", "mins": 40, "theory": "A <b>for loop</b> repeats code. <b>range(n)</b> gives 0 to n-1. <b>range(start,stop)</b> and <b>range(start,stop,step)</b>.", "concepts": ["for i in range(5)", "range(1,11) is 1 to 10", "range(0,10,2) even nums", "Indent loop body"], "code": "for i in range(5):\n    print(f\"Count: {i}\")\n\nfor i in range(1, 6):\n    print(f\"Number: {i}\")\n\nfor i in range(0, 11, 2):\n    print(f\"Even: {i}\")", "starter": "# Day 8: For loops!\nf he list"], "ans": 1, "exp": "for x in list loops through every item one at a time."}, {"q": "What does enumerate() give you?", "opts": ["Only the values", "Only the indices", "Both index and value", "The length"], "ans": 2, "exp": "enumerate(my_list) gives both the index number AND the value."}, {"q": "fruits = ['a','b','c']. How many times does 'for x in fruits' loop?", "opts": ["0", "2", "3", "4"], "ans": 2, "exp": "The list has 3 items so the loop runs 3 times."}, {"q": "What keyword immediately exits a loop?", "opts": ["exit", "stop", "end", "break"], "ans": 3, "exp": "break immediately stops the loop."}, {"q": "What does 'continue' do inside a loop?", "opts": ["Stops the loop", "Skips to the next iteration", "Restarts the loop", "Causes an error"], "ans": 1, "exp": "continue skips the rest of the current iteration and jumps to the next."}]}, {"day": 10, "title": "While loops", "level": "beg", "topic": "while", "mins": 40, "theory": "A <b>while loop</b> keeps running as long as a condition is True. Always update the condition to avoid infinite loops!", "concepts": ["while condition: runs code", "Update var to avoid infinite loop", "break exits early", "Use += to increment"], "code": "count = 1\nwhile count <= 5:\n    print(f\"Count: {count}\")\n    count += 1\nprint(\"Done!\")\n\nn = 5\nwhile n > 0:\n    print(n)\n    n -= 1\nprint(\"Blast off!\")", "starter": "# Day 10: While loops!\ncount = 1\nwhile count <= 5:\n    print(f\"Count: {count}\")\n    count += 1\nprint(\"Done!\")\n\nprint(\"---\")\nn = 5\nwhile n > 0:\n    print(n)\n    n -= 1\nprint(\"Blast off!\")", "questions": [{"q": "When does a while loop stop?", "opts": ["After 10 iterations", "When condition becomes False", "When you press Enter", "Never"], "ans": 1, "exp": "A while loop runs as long as the condition is True."}, {"q": "What is an infinite loop?", "opts": ["A loop that runs 100 times", "A loop whose condition never becomes False", "A loop with break", "A for loop"], "ans": 1, "exp": "An infinite loop runs forever because the condition never becomes False."}, {"q": "What does count += 1 do?", "opts": ["Sets count to 1", "Subtracts 1 from count", "Adds 1 to count", "Multiplies count by 1"], "ans": 2, "exp": "count += 1 is shorthand for count = count + 1."}, {"q": "How do you exit a while loop early?", "opts": ["exit()", "stop", "break", "return"], "ans": 2, "exp": "break immediately exits the loop."}, {"q": "n=3. How many times does 'while n > 0: n -= 1' loop?", "opts": ["2", "3", "4", "Forever"], "ans": 1, "exp": "n starts at 3. Loop runs for n=3,2,1. When n=0, condition is False. 3 times."}]}, {"day": 11, "title": "Lists create and access", "level": "beg", "topic": "lists1", "mins": 40, "theory": "Learn about <b>Lists create and access</b> — a key Python concept that builds on everything you have learned so far.", "concepts": ["Key concept 1 of Lists create and access", "Key concept 2", "Practice and apply", "Build real examples"], "code": "# Lists create and access\nprint(\"Learning Lists create and access!\")\n# Practice the concepts here", "starter": "# Day 11: Lists create and access!\n# Write your code below\nprint(\"Day 11 - Lists create and access\")\nprint(\"Keep going Mahi! You are doing great!\")", "questions": [{"type": "mc", "q": "colours = ['red','blue','green']. What is colours[1]?", "opts": ["'red'", "'blue'", "'green'", "Error"], "ans": 1, "exp": "List indexing starts at 0. colours[0]='red', colours[1]='blue', colours[2]='green'."}, {"type": "mc", "q": "What does colours[-1] return from ['red','blue','green']?", "opts": ["'red'", "'blue'", "'green'", "Error"], "ans": 2, "exp": "Negative indexing counts from the end. -1 is the last item, so colours[-1]='green'."}, {"type": "mc", "q": "nums = [10,20,30,40,50]. What does nums[1:3] return?", "opts": ["[10,20]", "[20,30]", "[20,30,40]", "[10,20,30]"], "ans": 1, "exp": "Slicing [1:3] returns items from index 1 up to (but NOT including) index 3: [20,30]."}, {"type": "tf", "q": "An empty list
