<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mahi's Python Adventure</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a1a}
#app{max-width:520px;margin:0 auto;padding:1rem 0.75rem 80px}
.hdr{text-align:center;margin-bottom:1rem;padding:1rem;background:#fff;border-radius:14px;border:1px solid #e5e5e0}
.hdr h1{font-size:20px;font-weight:700;color:#1a1a1a}
.hdr p{font-size:12px;color:#666;margin-top:3px}
.pills{display:flex;justify-content:center;gap:8px;margin:8px 0;flex-wrap:wrap}
.pill{border-radius:20px;padding:4px 12px;font-size:11px;font-weight:600}
.pf{background:#fff3cd;color:#856404}.pl{background:#cfe2ff;color:#084298}.px{background:#d1e7dd;color:#0a3622}
.xp-wrap{margin-bottom:1rem;background:#fff;border-radius:10px;padding:10px 12px;border:1px solid #e5e5e0}
.xp-lbl{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:5px}
.xp-bar{height:8px;background:#e9ecef;border-radius:4px;overflow:hidden}
.xp-fill{height:100%;background:#0d6efd;border-radius:4px;transition:width .5s}
.nav{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1.2rem}
.nb{background:#fff;border:1.5px solid #e5e5e0;border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
.nb:hover{border-color:#0d6efd;background:#f0f6ff}
.nb.active{border-color:#0d6efd;background:#e8f0fe}
.nb-icon{font-size:20px;margin-bottom:4px}
.nb-label{font-size:12px;font-weight:700;color:#1a1a1a}
.nb-sub{font-size:10px;color:#888;margin-top:2px}
.sec{display:none}.sec.on{display:block}
/* Day cards */
.day-card{background:#fff;border:1.5px solid #e5e5e0;border-radius:12px;padding:12px 14px;cursor:pointer;transition:border-color .15s;margin-bottom:8px}
.day-card:hover{border-color:#0d6efd}
.day-card.done{border-color:#198754;background:#f0faf4}
.day-card.today{border-color:#0d6efd;background:#f0f6ff}
.day-card.locked{opacity:.5;cursor:default}
.day-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.day-num{font-size:11px;font-weight:700;color:#0d6efd}
.dbadge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;display:inline-block;margin-bottom:5px}
.beg{background:#d1e7dd;color:#0a3622}.int{background:#fff3cd;color:#856404}.adv{background:#f8d7da;color:#842029}
.day-title{font-size:13px;font-weight:700;color:#1a1a1a}
.day-desc{font-size:11px;color:#666;margin-top:2px}
.day-meta{font-size:10px;color:#888;margin-top:4px}
/* Lesson */
.lview{background:#fff;border-radius:14px;border:1px solid #e5e5e0;padding:1rem}
.lview h2{font-size:16px;font-weight:700;margin-bottom:8px}
.lview p{font-size:13px;color:#444;line-height:1.65;margin-bottom:10px}
.concept-box{background:#f0f6ff;border-left:3px solid #0d6efd;border-radius:0 8px 8px 0;padding:10px 12px;margin:10px 0;font-size:12px;color:#333;line-height:1.7}
.cbox{background:#1a1a2e;border-radius:8px;padding:12px;margin:10px 0;font-family:monospace;font-size:12px;color:#e2e8f0;white-space:pre;overflow-x:auto;line-height:1.6}
.try-label{font-size:11px;color:#666;display:block;margin:12px 0 4px;font-weight:700}
.code-editor{width:100%;font-family:monospace;font-size:12px;border:1.5px solid #dee2e6;border-radius:8px;padding:10px;background:#fdfdfd;color:#1a1a1a;resize:vertical;min-height:100px;line-height:1.6}
.code-editor:focus{outline:none;border-color:#0d6efd}
.btn-row{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;align-items:center}
.btn-run{background:#0d6efd;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;font-weight:700}
.btn-run:hover{background:#0b5ed7}
.btn-sec{background:#fff;border:1.5px solid #dee2e6;border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;color:#1a1a1a;font-family:inherit}
.btn-sec:hover{background:#f8f9fa;border-color:#adb5bd}
.btn-ok{background:#198754;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;cursor:pointer;font-weight:700}
.btn-ok:hover{background:#146c43}
.out-box{background:#f8f9fa;border:1.5px solid #dee2e6;border-radius:8px;padding:10px;font-family:monospace;font-size:12px;margin-top:8px;min-height:40px;color:#1a1a1a;white-space:pre-wrap;display:none;line-height:1.6}
.out-box.ok{border-color:#198754;background:#f0faf4;color:#0a3622}
.out-box.err{border-color:#dc3545;background:#fff5f5;color:#842029}
.back-btn{background:none;border:none;color:#0d6efd;cursor:pointer;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:4px;padding:0;font-weight:700}
.section-title{font-size:15px;font-weight:700;margin-bottom:10px;color:#1a1a1a}
.info-box{background:#fff3cd;border:1px solid #ffe083;border-radius:8px;padding:9px 12px;font-size:12px;color:#856404;margin-bottom:12px;line-height:1.5}
/* Quiz */
.quiz-hdr{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:10px 14px;margin-bottom:10px}
.quiz-prog{font-size:11px;color:#666;margin-bottom:5px}
.qpbar{height:6px;background:#e9ecef;border-radius:3px;overflow:hidden}
.qpfill{height:100%;background:#198754;border-radius:3px;transition:width .3s}
.qcard{background:#fff;border:1.5px solid #e5e5e0;border-radius:12px;padding:1rem;margin-bottom:10px}
.qnum{font-size:10px;color:#888;font-weight:700;margin-bottom:5px}
.qtxt{font-size:13px;font-weight:700;color:#1a1a1a;line-height:1.55;margin-bottom:12px}
.qtxt code{background:#e9ecef;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:12px;color:#1a1a1a;word-break:break-all}
.opt{display:block;width:100%;text-align:left;background:#f8f9fa;border:1.5px solid #dee2e6;border-radius:8px;padding:10px 13px;margin-bottom:7px;cursor:pointer;font-size:12px;color:#1a1a1a;line-height:1.4;transition:all .12s;font-family:inherit;word-break:break-word}
.opt:hover:not(:disabled){border-color:#0d6efd;background:#f0f6ff}
.opt.correct{border-color:#198754!important;background:#d1e7dd!important;color:#0a3622!important;font-weight:700}
.opt.tried{border-color:#ffc107;background:#fff3cd;color:#856404}
.fb{border-radius:8px;padding:9px 12px;margin:8px 0;font-size:12px;line-height:1.5;display:none}
.fb.ok{background:#d1e7dd;color:#0a3622;display:block;border:1px solid #a3cfbb}
.fb.bad{background:#fff3cd;color:#856404;display:block;border:1px solid #ffe083}
.btn-next{background:#0d6efd;color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;display:none;margin-top:8px}
.btn-next:hover{background:#0b5ed7}
.qresult{text-align:center;background:#fff;border-radius:14px;border:1px solid #e5e5e0;padding:1.5rem}
.qresult .big{font-size:48px;margin-bottom:8px}
.qresult h2{font-size:18px;font-weight:700;margin-bottom:6px}
.qresult p{font-size:13px;color:#555;line-height:1.6;margin-bottom:14px}
/* Challenges */
.chal-card{background:#fff;border:1.5px solid #e5e5e0;border-radius:12px;padding:12px 14px;margin-bottom:10px}
.chal-card h3{font-size:13px;font-weight:700;margin-bottom:5px}
.chal-card p{font-size:12px;color:#555;line-height:1.6}
.hint-box{background:#f0f6ff;border:1px solid #b6d4fe;border-radius:7px;padding:8px 10px;margin-top:8px;font-size:11px;color:#084298;display:none;line-height:1.6}
.hint-btn{background:none;border:none;color:#0d6efd;font-size:11px;cursor:pointer;padding:0;margin-top:6px;font-weight:700}
/* Ask AI */
.topic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:12px}
.tchip{background:#f0f6ff;color:#084298;border-radius:8px;padding:8px 10px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;border:1px solid #b6d4fe;transition:all .12s}
.tchip:hover{background:#0d6efd;color:#fff}
.ai-resp{background:#f0f6ff;border:1px solid #b6d4fe;border-radius:10px;padding:11px 13px;margin-top:10px;font-size:12px;color:#1a1a1a;line-height:1.7;display:none}
.ai-lbl{font-size:10px;color:#0d6efd;font-weight:700;margin-bottom:5px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <h1>🐍 Mahi's Python Adventure</h1>
    <p>60-day journey from beginner to advanced!</p>
    <div class="pills">
      <span class="pill pf">🔥 Day <span id="cur-day">1</span></span>
      <span class="pill pl">⭐ Level <span id="lvl-top">1</span></span>
      <span class="pill px">✅ <span id="xp-top">0</span> XP</span>
    </div>
  </div>
  <div class="xp-wrap">
    <div class="xp-lbl">
      <span>Level <span id="lvl-lbl">1</span> — get 100% on quiz to level up!</span>
      <span><span id="qpct">0</span>% quiz score</span>
    </div>
    <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
  </div>
  <div class="nav">
    <button class="nb active" onclick="goSec('plan')" id="nav-plan">
      <div class="nb-icon">📅</div><div class="nb-label">60-Day Plan</div>
      <div class="nb-sub" id="plan-sub">Day 1 of 60</div>
    </button>
    <button class="nb" onclick="goSec('quiz')" id="nav-quiz">
      <div class="nb-icon">🧠</div><div class="nb-label">Today's Quiz</div>
      <div class="nb-sub">100% = level up</div>
    </button>
    <button class="nb" onclick="goSec('challenges')" id="nav-challenges">
      <div class="nb-icon">🏗️</div><div class="nb-label">Challenges</div>
      <div class="nb-sub">Mini projects</div>
    </button>
    <button class="nb" onclick="goSec('ask')" id="nav-ask">
      <div class="nb-icon">🤖</div><div class="nb-label">Ask AI Tutor</div>
      <div class="nb-sub">Clear any doubt</div>
    </button>
  </div>
  <div id="sec-plan" class="sec on">
    <div id="plan-list"></div>
    <div id="lesson-detail" style="display:none"></div>
  </div>
  <div id="sec-quiz" class="sec"><div id="quiz-area"></div></div>
  <div id="sec-challenges" class="sec"><div id="chal-area"></div></div>
  <div id="sec-ask" class="sec">
    <div class="section-title">Ask your AI tutor</div>
    <p style="font-size:12px;color:#666;margin-bottom:9px">Pick a topic or type your own question:</p>
    <div class="topic-grid" id="topic-chips"></div>
    <label style="font-size:11px;color:#888;display:block;margin-bottom:4px;font-weight:700">Your question</label>
    <textarea id="ask-input" style="width:100%;min-height:65px;font-size:12px;border:1.5px solid #dee2e6;border-radius:8px;padding:9px;resize:vertical;font-family:inherit" placeholder="e.g. What is the difference between a list and a tuple?"></textarea>
    <div class="btn-row" style="margin-top:8px"><button class="btn-run" onclick="askAI()">🚀 Ask</button></div>
    <div class="ai-resp" id="ai-box"><div class="ai-lbl">🤖 AI Tutor says:</div><div id="ai-text"></div></div>
  </div>
</div>
<script>
const DAYS=[{"day": 1, "title": "Variables and data types", "level": "beg", "topic": "variables", "mins": 35, "theory": "A <b>variable</b> is a labelled box that holds a value. Python has 4 main types: <b>str</b> (text), <b>int</b> (whole number), <b>float</b> (decimal), <b>bool</b> (True/False).", "concepts": ["Variables store data", "str int float bool", "Type is automatic", "print() shows output"], "code": "name = \"Mahi\"\nage = 13\nheight = 5.3\nis_cool = True\nprint(name)\nprint(age)\nprint(type(name))", "starter": "# Day 1: Variables!\nname = \"Mahi\"\nage = 13\nfavourite_colour = \"purple\"\nprint(\"Name:\", name)\nprint(\"Age:\", age)\nprint(\"Favourite colour:\", favourite_colour)", "questions": [{"q": "Which of these correctly creates a variable?", "opts": ["var name = 'Mahi'", "name = 'Mahi'", "create name 'Mahi'", "string name = 'Mahi'"], "ans": 1, "exp": "In Python just write: name = 'Mahi' — no keywords needed!"}, {"q": "What type is the value 13?", "opts": ["str", "float", "bool", "int"], "ans": 3, "exp": "13 is a whole number so it is an int (integer)."}, {"q": "What does print(type('hello')) output?", "opts": ["str", "string", "class str", "text"], "ans": 2, "exp": "type() returns the class name in angle brackets."}, {"q": "Which value is a float?", "opts": ["13", "True", "5.3", "hello"], "ans": 2, "exp": "A float is a decimal number. 5.3 is a float."}, {"q": "Which line prints the word Hello?", "opts": ["echo('Hello')", "console.log('Hello')", "print('Hello')", "say('Hello')"], "ans": 2, "exp": "Python uses print() to show output."}]}, {"day": 2, "title": "Strings and f-strings", "level": "beg", "topic": "strings", "mins": 40, "theory": "Strings are text in quotes. <b>F-strings</b> embed variables using f\"...{variable}...\". Methods: .upper() .lower() .len().", "concepts": ["Strings use quotes", "f string embeds vars", "len() counts chars", ".upper() .lower()"], "code": "name = \"Mahi\"\ngreeting = f\"Hello, {name}!\"\nprint(greeting)\nprint(len(name))\nprint(name.upper())", "starter": "# Day 2: Strings!\nname = \"Mahi\"\nhobby = \"coding\"\nprint(f\"My name is {name}\")\nprint(f\"I love {hobby}\")\nprint(\"MAHI\".lower())\nprint(len(name))", "questions": [{"q": "What does f'Hello {name}' do?", "opts": ["Prints the letter f", "Puts the value of name inside the text", "Creates a list", "Causes an error"], "ans": 1, "exp": "f-strings embed variable values inside text."}, {"q": "What does len('Python') return?", "opts": ["5", "6", "7", "Error"], "ans": 1, "exp": "P-y-t-h-o-n has 6 characters."}, {"q": "What does 'hello'.upper() return?", "opts": ["Hello", "HELLO", "hello", "hELLO"], "ans": 1, "exp": ".upper() converts all characters to uppercase."}, {"q": "How do you join two strings?", "opts": ["'hi' & ' there'", "'hi' + ' there'", "'hi' join ' there'", "merge('hi',' there')"], "ans": 1, "exp": "Use + to join strings."}, {"q": "Which creates an f-string?", "opts": ["s'Hello'", "f'Hello'", "format'Hello'", "string'Hello'"], "ans": 1, "exp": "F-strings start with f before the quote."}]}, {"day": 3, "title": "Getting user input", "level": "beg", "topic": "input", "mins": 35, "theory": "The <b>input()</b> function asks the user a question. The answer is always a string, so use <b>int()</b> or <b>float()</b> to convert to numbers.", "concepts": ["input() reads user text", "Always returns a string", "int() converts to number", "float() for decimals"], "code": "name = input(\"What is your name? \")\nprint(f\"Hello, {name}!\")\nage = int(input(\"How old are you? \"))\nprint(f\"Next year you will be {age + 1}\")", "starter": "# Day 3: User Input!\n# input() returns 'demo_input' in this browser editor\nname = input(\"Enter your name: \")\nprint(f\"Hello, {name}! Welcome!\")\nage_str = input(\"Enter your age: \")\nage = int(age_str)\nprint(f\"In 5 years you will be {age + 5}\")", "questions": [{"q": "What function gets input from the user?", "opts": ["get()", "read()", "input()", "ask()"], "ans": 2, "exp": "input() displays a prompt and waits for the user to type."}, {"q": "What type does input() always return?", "opts": ["int", "float", "bool", "str"], "ans": 3, "exp": "input() always returns a string even if the user types a number."}, {"q": "How do you convert the string '13' to an integer?", "opts": ["str('13')", "int('13')", "float('13')", "number('13')"], "ans": 1, "exp": "int() converts a string like '13' to the integer 13."}, {"q": "What does int(input('Age: ')) do?", "opts": ["Asks for age and stores as string", "Asks for age and converts to integer", "Prints the age", "Causes an error always"], "ans": 1, "exp": "It asks for input and immediately converts it to an integer."}, {"q": "What would input('Name: ') display?", "opts": ["Name:", "input", "A blank screen", "An error"], "ans": 0, "exp": "The text inside input() is the prompt shown to the user."}]}, {"day": 4, "title": "Maths and operators", "level": "beg", "topic": "operators", "mins": 35, "theory": "Python operators: + - * / // (floor divide) % (remainder) ** (power). Order follows BODMAS.", "concepts": ["+ - * / basic maths", "** means power", "// floor division", "% gives remainder"], "code": "print(10 + 3)\nprint(10 - 3)\nprint(10 * 3)\nprint(10 / 3)\nprint(10 // 3)\nprint(10 % 3)\nprint(2 ** 8)\nprint((5 + 3) * 2)", "starter": "# Day 4: Maths!\na = 20\nb = 7\nprint(\"Add:\", a + b)\nprint(\"Subtract:\", a - b)\nprint(\"Multiply:\", a * b)\nprint(\"Divide:\", a / b)\nprint(\"Floor divide:\", a // b)\nprint(\"Remainder:\", a % b)\nprint(\"Power:\", 2 ** 10)", "questions": [{"q": "What does 10 ** 3 equal?", "opts": ["30", "1000", "13", "Error"], "ans": 1, "exp": "** means to the power of. 10 ** 3 = 1000."}, {"q": "What does 17 % 5 return?", "opts": ["3", "2", "5", "17"], "ans": 1, "exp": "% gives the remainder. 17 divided by 5 = 3 remainder 2."}, {"q": "What does 7 // 2 return?", "opts": ["3.5", "3", "4", "2"], "ans": 1, "exp": "// is floor division — divides and drops the decimal."}, {"q": "What is the result of (4 + 6) * 2?", "opts": ["12", "16", "20", "14"], "ans": 2, "exp": "Brackets first: 4+6=10. Then 10*2=20."}, {"q": "Which operator gives the power of a number?", "opts": ["^", "^^", "**", "pow"], "ans": 2, "exp": "Python uses ** for powers. So 2 ** 3 = 8."}]}, {"day": 5, "title": "Comparisons and booleans", "level": "beg", "topic": "booleans", "mins": 35, "theory": "Comparison operators return <b>True</b> or <b>False</b>. Use == != > < >= <=. Combine with <b>and</b>, <b>or</b>, <b>not</b>.", "concepts": ["== checks equality", "!= means not equal", "and or not", "Returns True or False"], "code": "print(5 > 3)\nprint(5 == 5)\nprint(5 != 3)\nprint(10 >= 10)\nprint(True and False)\nprint(True or False)\nprint(not True)", "starter": "# Day 5: Comparisons!\nage = 13\nprint(age > 10)\nprint(age == 13)\nprint(age != 18)\nprint(age >= 13 and age < 18)\nprint(age < 5 or age > 10)", "questions": [{"q": "What does 5 == 5 return?", "opts": ["5", "True", "False", "Error"], "ans": 1, "exp": "== checks equality. 5 == 5 is True."}, {"q": "What does True and False return?", "opts": ["True", "False", "None", "Error"], "ans": 1, "exp": "and requires BOTH sides to be True."}, {"q": "What does not True return?", "opts": ["True", "False", "not", "Error"], "ans": 1, "exp": "not flips the boolean. not True = False."}, {"q": "Which checks if x is NOT equal to 5?", "opts": ["x !== 5", "x <> 5", "x != 5", "x =! 5"], "ans": 2, "exp": "!= means not equal to in Python."}, {"q": "What does True or False return?", "opts": ["True", "False", "None", "Error"], "ans": 0, "exp": "or only needs ONE side to be True."}]}, {"day": 6, "title": "If elif else", "level": "beg", "topic": "if", "mins": 40, "theory": "<b>if</b> runs code when True. <b>elif</b> checks another condition. <b>else</b> is the default. Python uses 4-space indentation.", "concepts": ["if runs when True", "elif is else if", "else is the default", "Indent with 4 spaces"], "code": "score = 85\nif score >= 90:\n    print(\"A grade!\")\nelif score >= 75:\n    print(\"B grade!\")\nelif score >= 60:\n    print(\"C grade!\")\nelse:\n    print(\"Keep practising!\")", "starter": "# Day 6: If elif else!\nscore = 85\nif score >= 90:\n    print(\"A grade!\")\nelif score >= 75:\n    print(\"B grade!\")\nelif score >= 60:\n    print(\"C grade!\")\nelse:\n    print(\"Keep practising!\")\n# Try changing score to 95, 70, 55", "questions": [{"q": "What keyword introduces a secondary condition?", "opts": ["else if", "elseif", "elif", "otherwise"], "ans": 2, "exp": "In Python, elif is short for else if."}, {"q": "What runs if no if or elif is True?", "opts": ["Nothing", "Python crashes", "The else block runs", "elif runs again"], "ans": 2, "exp": "The else block runs when none of the if/elif conditions were True."}, {"q": "What must come at the end of an if statement line?", "opts": ["A semicolon ;", "A colon :", "A bracket )", "Nothing"], "ans": 1, "exp": "Every if, elif, and else line must end with a colon."}, {"q": "How does Python know what code is inside the if block?", "opts": ["Curly braces", "BEGIN and END", "Indentation (spaces)", "Brackets"], "ans": 2, "exp": "Python uses indentation — 4 spaces — to group code inside blocks."}, {"q": "score = 72. Which block runs: if score>=90 / elif score>=75 / else?", "opts": ["if block", "elif block", "else block", "None"], "ans": 2, "exp": "72 is less than both 90 and 75 so the else block runs."}]}, {"day": 7, "title": "Week 1 Review and Mini Calculator", "level": "beg", "topic": "review1", "mins": 45, "theory": "Review Week 1: variables, strings, input, maths, comparisons, if/elif/else. Build a mini calculator!", "concepts": ["Review variables", "Review if/else", "Review input", "Build a calculator"], "code": "num1 = 10\nnum2 = 5\nop = \"+\"\nif op == \"+\":\n    result = num1 + num2\nelif op == \"-\":\n    result = num1 - num2\nelif op == \"*\":\n    result = num1 * num2\nelif op == \"/\":\n    if num2 != 0:\n        result = num1 / num2\n    else:\n        result = \"E <script>

let xp=0,level=1,currentDay=1,quizState=null,daysDone=new Set();

function goSec(name){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('on');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='plan')renderPlan();
  if(name==='quiz')startQuiz(currentDay-1);
  if(name==='challenges')renderChallenges();
  if(name==='ask')renderAsk();
}

function updateUI(){
  document.getElementById('cur-day').textContent=currentDay;
  document.getElementById('lvl-top').textContent=level;
  document.getElementById('xp-top').textContent=xp;
  document.getElementById('lvl-lbl').textContent=level;
  document.getElementById('plan-sub').textContent='Day '+currentDay+' of 60';
}

function renderPlan(){
  document.getElementById('lesson-detail').style.display='none';
  const list=document.getElementById('plan-list');
  list.style.display='block';
  const lvlName=d=>d.level==='beg'?'Beginner':d.level==='int'?'Intermediate':'Advanced';
  list.innerHTML='<div class="section-title">📅 Your 60-Day Plan</div>'+
    DAYS.map(d=>{
      const isDone=daysDone.has(d.day),isToday=d.day===currentDay,isLocked=d.day>currentDay;
      let cls='day-card';
      if(isDone)cls+=' done';else if(isToday)cls+=' today';else if(isLocked)cls+=' locked';
      const oc=isLocked?'':'onclick="openDay('+( d.day-1)+')"';
      const icon=isDone?'✅':isToday?'👉':isLocked?'🔒':'📖';
      return`<div class="${cls}" ${oc}>
        <div class="day-top"><div class="day-num">Day ${d.day} ${icon}</div>
        <span class="dbadge ${d.level}">${lvlName(d)}</span></div>
        <div class="day-title">${d.title}</div>
        <div class="day-desc">${d.concepts.slice(0,2).join(' · ')}</div>
        <div class="day-meta">~${d.mins} mins · ${d.questions.length} quiz questions</div>
      </div>`;
    }).join('');
  updateUI();
}

function openDay(idx){
  const d=DAYS[idx];
  document.getElementById('plan-list').style.display='none';
  const det=document.getElementById('lesson-detail');
  det.style.display='block';
  const lvlName=d.level==='beg'?'Beginner':d.level==='int'?'Intermediate':'Advanced';
  const done=daysDone.has(d.day);
  det.innerHTML=`
    <button class="back-btn" onclick="closeDayBack()">← Back to plan</button>
    <div class="lview">
      <span class="dbadge ${d.level}" style="display:inline-block;margin-bottom:8px">${lvlName}</span>
      <h2>Day ${d.day}: ${d.title}</h2>
      <div class="concept-box"><strong>Today's concepts:</strong><br>${d.concepts.map(c=>'▸ '+c).join('<br>')}</div>
      <p>${d.theory}</p>
      <div class="cbox">${escHtml(d.code)}</div>
      <span class="try-label">✏️ Try it yourself — edit and run:</span>
      <textarea class="code-editor" id="ce-${idx}">${escHtml(d.starter)}</textarea>
      <div class="btn-row">
        <button class="btn-run" onclick="runCode(${idx})">▶ Run</button>
        <button class="btn-sec" onclick="askAboutDay('Day ${d.day}: ${d.title.replace(/'/g,"\\'")}')">Ask AI ↗</button>
        ${!done?`<button class="btn-ok" onclick="markDone(${idx})">✓ Done +${d.mins} XP</button>`:'<span style="color:#198754;font-weight:700;align-self:center">✅ Completed!</span>'}
      </div>
      <div id="out-${idx}" class="out-box"></div>
      <div style="margin-top:16px;padding-top:12px;border-top:1px solid #e5e5e0">
        <button class="btn-run" onclick="startQuiz(${idx})">🧠 Take quiz (${d.questions.length} questions)</button>
      </div>
    </div>`;
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function closeDayBack(){
  document.getElementById('plan-list').style.display='block';
  document.getElementById('lesson-detail').style.display='none';
}

function runCode(idx){
  const code=document.getElementById('ce-'+idx).value;
  const out=document.getElementById('out-'+idx);
  out.style.display='block';out.className='out-box';
  const logs=[];const old=console.log;
  console.log=(...a)=>logs.push(a.map(x=>typeof x==='object'&&x!==null?JSON.stringify(x):String(x)).join(' '));
  try{
    let processed=code
      .replace(/input\s*\([^)]*\)/g,'"demo_input"')
      .replace(/^(\s*)print\s*\(/gm,'$1console.log(');
    new Function(processed)();
    out.textContent=logs.join('\n')||'(no output — did you call print()?)';
    out.classList.add('ok');
  }catch(e){out.textContent='Error: '+e.message;out.classList.add('err');}
  console.log=old;
}

function markDone(idx){
  const d=DAYS[idx];
  if(!daysDone.has(d.day)){
    daysDone.add(d.day);xp+=d.mins;
    if(d.day===currentDay&&currentDay<60)currentDay++;
    updateUI();openDay(idx);
  }
}

function startQuiz(dayIdx){
  if(typeof dayIdx==='undefined'||dayIdx<0||dayIdx>=DAYS.length)dayIdx=currentDay-1;
  quizState={dayIdx,qi:0,correct:0,firstPick:true,answered:false,lastPct:0};
  goSec('quiz');
  renderQuizQ();
}

function renderQuizQ(){
  const d=DAYS[quizState.dayIdx];
  const q=d.questions[quizState.qi];
  const total=d.questions.length;
  const pct=Math.round(quizState.correct/total*100);
  document.getElementById('quiz-area').innerHTML=`
    <div class="quiz-hdr">
      <div class="quiz-prog">Day ${d.day}: ${d.title} — Q${quizState.qi+1} of ${total} | Correct: ${quizState.correct}</div>
      <div class="qpbar"><div class="qpfill" style="width:${pct}%"></div></div>
    </div>
    <div class="qcard">
      <div class="qnum">Question ${quizState.qi+1} of ${total}</div>
      <div class="qtxt">${fmtQ(q.q)}</div>
      ${q.opts.map((o,i)=>`<button class="opt" id="qo${i}" onclick="pick(${i})">${escHtml(o)}</button>`).join('')}
      <div class="fb" id="qfb"></div>
      <button class="btn-next" id="qnext" onclick="nextQ()">Next question →</button>
    </div>`;
}

function fmtQ(t){
  return t.replace(/`([^`]+)`/g,'<code>$1</code>');
}

function pick(i){
  const d=DAYS[quizState.dayIdx];
  const q=d.questions[quizState.qi];
  const fb=document.getElementById('qfb');
  if(i===q.ans){
    document.getElementById('qo'+i).classList.add('correct');
    document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
    if(quizState.firstPick){
      quizState.correct++;
      fb.className='fb ok';
      fb.innerHTML='<strong>✓ Correct!</strong> '+q.exp;
    }else{
      fb.className='fb ok';
      fb.innerHTML='<strong>Found it!</strong> '+q.exp;
    }
    quizState.answered=true;
    document.getElementById('qnext').style.display='inline-block';
  }else{
    if(quizState.firstPick)quizState.firstPick=false;
    document.getElementById('qo'+i).classList.add('tried');
    fb.className='fb bad';
    fb.textContent='Not quite — keep exploring to find the right answer. No points for this one, but you will learn!';
  }
}

function nextQ(){
  if(!quizState.answered)return;
  quizState.qi++;quizState.firstPick=true;quizState.answered=false;
  const d=DAYS[quizState.dayIdx];
  if(quizState.qi>=d.questions.length){showQuizResult();}else{renderQuizQ();}
}

function showQuizResult(){
  const d=DAYS[quizState.dayIdx];
  const total=d.questions.length;
  const pct=Math.round(quizState.correct/total*100);
  const passed=pct===100;
  if(passed){level++;xp+=50;updateUI();}
  const icon=passed?'🏆':pct>=80?'⭐':pct>=60?'👍':'📚';
  const msg=passed?`Perfect score! You levelled up to Level ${level}!`:
    pct>=80?'Great job! Try again to get 100% and level up!':
    pct>=60?'Good effort! Review the lesson and try again.':
    'Keep studying! You can do this, Mahi! 💪';
  document.getElementById('qpct').textContent=pct;
  document.getElementById('xp-fill').style.width=Math.min(pct,100)+'%';
  document.getElementById('quiz-area').innerHTML=`
    <div class="qresult">
      <div class="big">${icon}</div>
      <h2>${msg}</h2>
      <p>Day ${d.day}: ${d.title}<br>Score: <strong>${quizState.correct} / ${total} (${pct}%)</strong><br>
      ${passed?'<em>You earned +50 bonus XP!</em>':'<em>Get 100% correct to earn bonus XP and level up!</em>'}</p>
      <div class="btn-row" style="justify-content:center;margin-top:12px;flex-wrap:wrap">
        <button class="btn-run" onclick="startQuiz(${quizState.dayIdx})">🔄 Try again</button>
        <button class="btn-sec" onclick="openDay(${quizState.dayIdx});goSec('plan')">📖 Review lesson</button>
        ${quizState.dayIdx+1<DAYS.length?`<button class="btn-sec" onclick="startQuiz(${quizState.dayIdx+1})">Next day →</button>`:''}
      </div>
    </div>`;
}

function renderChallenges(){
  document.getElementById('chal-area').innerHTML=
    '<div class="section-title">🏗️ Coding Challenges</div>'+
    '<div class="info-box">Build these in Python on your computer. Tap a hint if you need a nudge!</div>'+
    CHALLENGES.map((c,i)=>{
      const ln=c.level==='beg'?'Beginner':c.level==='int'?'Intermediate':'Advanced';
      return`<div class="chal-card">
        <span class="dbadge ${c.level}" style="display:inline-block;margin-bottom:6px">${ln}</span>
        <h3>${c.title}</h3><p>${c.desc}</p>
        <button class="hint-btn" onclick="toggleHint(${i})">💡 Show hint</button>
        <div class="hint-box" id="hint-${i}">${c.hint}</div>
        <div class="btn-row" style="margin-top:8px">
          <button class="btn-sec" onclick="askChallenge('${c.title.replace(/'/g,"\\'")}')">Ask AI for help ↗</button>
        </div>
      </div>`;
    }).join('');
}

function toggleHint(i){
  const h=document.getElementById('hint-'+i);
  h.style.display=h.style.display==='none'?'block':'none';
}

function renderAsk(){
  document.getElementById('topic-chips').innerHTML=
    TOPICS.map(t=>`<div class="tchip" onclick="setTopic('${t.replace(/'/g,"\\'")}')"> ${t}</div>`).join('');
}

function setTopic(t){
  document.getElementById('ask-input').value=`Can you explain "${t}" in Python with a simple example for a 13-year-old beginner?`;
}

function askAboutDay(title){
  goSec('ask');
  document.getElementById('ask-input').value=`Explain "${title}" with another clear example for a 13-year-old learner.`;
  askAI();
}

function askChallenge(title){
  goSec('ask');
  document.getElementById('ask-input').value=`Give me a hint (not the full answer) for the Python challenge: "${title}". Keep it simple for a 13-year-old.`;
  askAI();
}

async function askAI(){
  const q=document.getElementById('ask-input').value.trim();
  if(!q)return;
  const box=document.getElementById('ai-box');
  const txt=document.getElementById('ai-text');
  box.style.display='block';
  txt.textContent='🤔 Thinking...';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:800,
        system:'You are a friendly Python tutor for Mahi, a 13-year-old beginner. Explain simply, use fun analogies, always include a short runnable code example. Keep answers under 200 words. Use occasional emojis. Never use jargon without explaining it.',
        messages:[{role:'user',content:q}]
      })
    });
    const data=await res.json();
    const ans=data.content?.find(b=>b.type==='text')?.text||'Could not get an answer. Try again!';
    txt.innerHTML=ans
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>')
      .replace(/`([^`]+)`/g,'<code style="background:#e9ecef;padding:1px 5px;border-radius:4px;font-family:monospace;font-size:11px">$1</code>');
  }catch(e){
    txt.textContent='Could not reach the AI tutor. Check your internet and try again.';
  }
}

renderPlan();
renderAsk();
updateUI();

</script>
</body>
</html>
