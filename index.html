<script>
// ── STATE ──
let xp=0, level=1, currentDay=1, quizState=null, daysDone=new Set();
try {
  const sv = JSON.parse(localStorage.getItem('mahi_py_v3')||'{}');
  if(sv.xp!=null){ xp=sv.xp; level=sv.level||1; currentDay=sv.currentDay||1; daysDone=new Set(sv.daysDone||[]); }
} catch(e){}
function saveState(){ try{ localStorage.setItem('mahi_py_v3', JSON.stringify({xp,level,currentDay,daysDone:[...daysDone]})); }catch(e){} }

function addXP(n){
  const old=level; xp+=n;
  level=Math.floor(xp/100)+1;
  updateTopBar();
  if(level>old) showToast('🎉 Level Up! You\'re now Level '+level+'!');
  saveState();
}
function updateTopBar(){
  document.getElementById('s-day').textContent=currentDay;
  document.getElementById('s-xp').textContent=xp;
  document.getElementById('s-lvl').textContent=level;
  const pct=((xp%100)/100)*100;
  document.getElementById('xp-bar').style.width=pct+'%';
}
function showToast(msg,dur=2800){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ── NAV — NO recursive rendering ──
const _sectionRenderers = {};
function goSec(name){
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  const sec=document.getElementById('sec-'+name);
  if(sec) sec.classList.add('on');
  const btn=document.getElementById('bnav-'+name);
  if(btn) btn.classList.add('active');
  if(name==='home')       renderHome();
  if(name==='lessons')    renderLessons();
  if(name==='challenges') renderChallenges();
  if(name==='ask')        renderAsk();
  // 'lesson', 'quiz' rendered explicitly — never triggered by nav
}

// ── HOME ──
function renderHome(){
  const done=daysDone.size;
  const pct=Math.round(done/60*100);
  const td=DAYS[currentDay-1];
  const lvlName=d=>d.level==='beg'?'Beginner':d.level==='int'?'Intermediate':'Advanced';
  document.getElementById('sec-home').innerHTML=`
    <div class="plan-hero">
      <div class="ph-label">👋 Welcome back, Mahi!</div>
      <div class="ph-title">Your Python<br><span class="accent">Adventure</span></div>
      <div class="ph-desc">60 days from beginner to advanced Python. Keep the streak going — you're building something amazing!</div>
      <div class="ph-stats">
        <div class="ph-stat"><span class="psv">${done}</span><span class="psl">Days Done</span></div>
        <div class="ph-stat"><span class="psv">${xp}</span><span class="psl">Total XP</span></div>
        <div class="ph-stat"><span class="psv">Lv ${level}</span><span class="psl">Your Level</span></div>
        <div class="ph-stat"><span class="psv">${60-done}</span><span class="psl">Remaining</span></div>
      </div>
      <div class="ph-prog">
        <span class="ph-prog-label">Overall Progress</span>
        <div class="ph-bar-wrap"><div class="ph-bar" style="width:${pct}%"></div></div>
        <span class="ph-prog-pct">${pct}%</span>
      </div>
    </div>
    <div class="plan-body">
      ${td?`
      <div class="section-eyebrow">Today's Lesson — Day ${currentDay}</div>
      <div class="today-card" onclick="openDay(${currentDay-1})">
        <div class="tc-tag"><span class="tc-dot"></span>Continue Learning · ${lvlName(td)}</div>
        <span class="tc-emoji">🐍</span>
        <div class="tc-title">${td.title}</div>
        <div class="tc-level">${td.concepts?td.concepts.slice(0,2).join(' · '):''}</div>
        <div class="tc-footer">
          <span class="tc-pill">⏱ ~${td.mins} min</span>
          <span class="tc-pill">❓ ${td.questions.length} Qs</span>
          ${daysDone.has(td.day)?'<span class="tc-pill">✅ Done</span>':''}
          <div class="tc-arrow">→</div>
        </div>
      </div>`:
      `<div style="text-align:center;padding:30px;background:var(--green-light);border-radius:20px;border:2px solid var(--green);margin-bottom:20px">
        <div style="font-size:48px;margin-bottom:8px">🎓</div>
        <div style="font-size:22px;font-weight:900;color:var(--green)">All 60 Days Complete!</div>
        <div style="font-size:14px;color:var(--g5);margin-top:4px;font-weight:600">You're a Python programmer! 🏆</div>
      </div>`}
      <div class="section-eyebrow" style="margin-top:20px">Quick Stats</div>
      <div class="stats-grid">
        <div class="sg"><div class="sg-icon">📅</div><span class="sg-val">${done}</span><span class="sg-lbl">Done</span></div>
        <div class="sg"><div class="sg-icon">⭐</div><span class="sg-val">${xp}</span><span class="sg-lbl">XP</span></div>
        <div class="sg"><div class="sg-icon">🏆</div><span class="sg-val">${level}</span><span class="sg-lbl">Level</span></div>
        <div class="sg"><div class="sg-icon">🎯</div><span class="sg-val">${60-done}</span><span class="sg-lbl">Left</span></div>
      </div>
      <div class="section-eyebrow">Continue Your Journey</div>
      <div style="display:flex;gap:10px">
        <button style="flex:1;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);padding:13px;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font)" onclick="goSec('lessons')">📖 All Lessons</button>
        <button style="flex:1;background:var(--white);border:2px solid var(--g2);border-radius:var(--radius);padding:13px;font-size:14px;font-weight:800;cursor:pointer;color:var(--g7);font-family:var(--font)" onclick="goSec('challenges')">🏗️ Challenges</button>
      </div>
    </div>`;
}

// ── LESSONS LIST ──
function renderLessons(){
  const lvlName=d=>d.level==='beg'?'Beginner':d.level==='int'?'Intermediate':'Advanced';
  const lvlColor=d=>d.level==='beg'?'lvl-beg':d.level==='int'?'lvl-int':'lvl-adv';
  let html='<div style="padding:22px 24px">';
  DAYS.forEach((d,i)=>{
    const isDone=daysDone.has(d.day),isToday=d.day===currentDay,isLocked=d.day>currentDay;
    let cls='day-card';
    if(isDone) cls+=' done'; else if(isToday) cls+=' today-day'; else if(isLocked) cls+=' locked';
    const oc=isLocked?'':`onclick="openDay(${i})"`;
    const statusIcon=isDone?'✅':isToday?'▶️':isLocked?'🔒':'📖';
    const colors={beg:'#7c3aed20',int:'#f59e0b20',adv:'#ef444420'};
    html+=`<div class="${cls}" ${oc}>
      <div class="dc-icon" style="background:${colors[d.level]||'#f1f5f9'}">${d.level==='beg'?'🌱':d.level==='int'?'🚀':'⚡'}</div>
      <div class="dc-info">
        <div class="dc-meta"><span class="dc-num">Day ${d.day}</span><span class="dc-lvl">${lvlName(d)}</span></div>
        <div class="dc-title">${d.title}</div>
        <div class="dc-sub">~${d.mins} min · ${d.questions.length} quiz questions</div>
      </div>
      <div class="dc-status">${statusIcon}</div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('sec-lessons').innerHTML=html;
}

// ── OPEN DAY (LESSON) ──
function openDay(idx){
  const d=DAYS[idx];
  const lvlName=d.level==='beg'?'Beginner':d.level==='int'?'Intermediate':'Advanced';
  const lvlColor=d.level==='beg'?'#7c3aed':d.level==='int'?'#f59e0b':'#ef4444';
  const done=daysDone.has(d.day);
  const sectionIcons=['💡','📝','⚠️','🌍','📌','🔬'];

  const sectionsHtml=(d.lesson&&d.lesson.sections?d.lesson.sections:[]).map((s,si)=>`
    <div class="concept-section" id="cs-wrap-${idx}-${si}">
      <div class="cs-head" id="csh-${idx}-${si}" onclick="toggleCS(${idx},${si})">
        <div class="cs-icon">${sectionIcons[si]||'📌'}</div>
        <h3>${s.head}</h3>
        <span class="cs-chev">▼</span>
      </div>
      <div class="cs-body" id="csb-${idx}-${si}">
        <p>${s.body}</p>
        <div class="example-box">${s.example}</div>
      </div>
    </div>`).join('');

  // Escape code for display only (not the textarea!)
  const displayCode = d.code ? d.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';

  document.getElementById('sec-lesson').innerHTML=`
    <div class="lesson-hero" style="background:linear-gradient(135deg,${lvlColor}dd,${lvlColor}99)">
      <button class="back-btn" onclick="goSec('lessons')">← Back</button>
      <span class="lesson-emoji">${d.level==='beg'?'🌱':d.level==='int'?'🚀':'⚡'}</span>
      <h2>Day ${d.day}: ${d.title}</h2>
      <div class="lesson-obj">🎯 ${d.objective||d.desc||''}</div>
    </div>
    <div class="lesson-body">
      <div class="lesson-intro">✨ ${d.theory||d.lesson?.intro||''}</div>
      ${sectionsHtml}
      ${d.code?`<div class="code-demo">${displayCode}</div>`:''}
      <span class="editor-label">✏️ Try it yourself — edit and run:</span>
      <textarea class="code-editor" id="editor-${idx}" spellcheck="false">${d.starter||''}</textarea>
      <div class="run-area">
        <button class="btn-run" onclick="runCode(${idx})">▶ Run</button>
        <button class="btn-secondary" onclick="askAboutDay('${escAttr(d.title)}')">Ask AI ↗</button>
        ${!done
          ? `<button class="btn-done" onclick="markDone(${idx})">✓ Done +${d.mins} XP</button>`
          : `<span class="completed-tag">✅ Completed!</span>`}
      </div>
      <div class="output-box" id="output-${idx}"></div>
      <div class="quiz-launch">
        <button class="btn-quiz-launch" onclick="startQuiz(${idx})">
          🧠 Start Quiz — ${d.questions.length} Questions
        </button>
      </div>
    </div>`;

  // Switch to lesson section without triggering nav renderers
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-lesson').classList.add('on');
  document.getElementById('bnav-lessons').classList.add('active');

  // Auto-open first concept section
  toggleCS(idx,0);
}

function toggleCS(dayIdx,si){
  const head=document.getElementById('csh-'+dayIdx+'-'+si);
  const body=document.getElementById('csb-'+dayIdx+'-'+si);
  const wrap=document.getElementById('cs-wrap-'+dayIdx+'-'+si);
  if(!head||!body) return;
  const isOpen=body.classList.contains('cs-open');
  body.classList.toggle('cs-open',!isOpen);
  head.classList.toggle('cs-open',!isOpen);
  if(wrap) wrap.classList.toggle('open-s',!isOpen);
}

// ── RUN CODE — Fixed: use raw textarea value, handle indentation ──
// ── Python-compatibility shim (runs once) ──
(function installPyShim(){
  if(String.prototype.upper) return;
  String.prototype.upper = function(){ return this.toUpperCase(); };
  String.prototype.lower = function(){ return this.toLowerCase(); };
  String.prototype.strip = function(){ return this.trim(); };
  String.prototype.title = function(){ return this.replace(/\w\S*/g,t=>t.charAt(0).toUpperCase()+t.substr(1).toLowerCase()); };
  String.prototype.replace_py = function(a,b){ return this.split(a).join(b); };
  String.prototype.startswith = function(s){ return this.startsWith(s); };
  String.prototype.endswith = function(s){ return this.endsWith(s); };
  String.prototype.split_py = function(sep){ return sep===undefined ? this.trim().split(/\s+/) : this.split(sep); };
  Array.prototype.append = function(x){ this.push(x); return undefined; };
  Array.prototype.remove = function(x){ const i=this.indexOf(x); if(i>-1) this.splice(i,1); return undefined; };
  Array.prototype.pop_py = function(i){ return i===undefined ? this.pop() : this.splice(i,1)[0]; };
  Array.prototype.sort_py = function(){ return this.sort((a,b)=>a>b?1:a<b?-1:0); };
})();
function pyLen(x){
  if(x==null) return 0;
  if(typeof x==='string'||Array.isArray(x)) return x.length;
  if(typeof x==='object') return Object.keys(x).length;
  return 0;
}
function pyRange(a,b,c){
  let start=0,stop,step=1;
  if(b===undefined){ stop=a; } else { start=a; stop=b; if(c!==undefined) step=c; }
  const out=[];
  if(step>0) for(let i=start;i<stop;i+=step) out.push(i);
  else for(let i=start;i>stop;i+=step) out.push(i);
  return out;
}
function pyInt(x){ const n=parseInt(x,10); return isNaN(n)?0:n; }
function pyFloat(x){ const n=parseFloat(x); return isNaN(n)?0:n; }
function pyStr(x){ return String(x); }
function pyEnumerate(arr,start){ start=start||0; return arr.map((v,i)=>[i+start,v]); }

function runCode(idx){
  const textarea=document.getElementById('editor-'+idx);
  const out=document.getElementById('output-'+idx);
  if(!textarea||!out) return;
  const raw=textarea.value;
  out.style.display='block'; out.className='output-box';
  const logs=[]; const fakeConsole={ log:(...a)=>logs.push(a.map(x=>{
    if(Array.isArray(x)) return '['+x.map(v=>typeof v==='string'?"'"+v+"'":v).join(', ')+']';
    if(typeof x==='object'&&x!==null) return JSON.stringify(x);
    if(typeof x==='boolean') return x?'True':'False';
    return String(x);
  }).join(' ')) };
  try{
    let code=raw
      .replace(/#.*$/gm,'')
      .replace(/input\s*\([^)]*\)/g,'"5"')
      .replace(/\bTrue\b/g,'true')
      .replace(/\bFalse\b/g,'false')
      .replace(/\bNone\b/g,'null')
      .replace(/\bprint\s*\(/g,'console.log(')
      .replace(/\blen\s*\(/g,'pyLen(')
      .replace(/\brange\s*\(/g,'pyRange(')
      .replace(/\bint\s*\(/g,'pyInt(')
      .replace(/\bfloat\s*\(/g,'pyFloat(')
      .replace(/\bstr\s*\(/g,'pyStr(')
      .replace(/\benumerate\s*\(/g,'pyEnumerate(')
      // protect // (floor division) before f-string/comment handling touches it
      .replace(/([a-zA-Z0-9_\)\]])\s*\/\/\s*([a-zA-Z0-9_\(])/g,'$1 FLOORDIV $2')
      .replace(/f"([^"]*)"/g,(m,s)=>'`'+s.replace(/\{/g,'${')+'`')
      .replace(/f'([^']*)'/g,(m,s)=>'`'+s.replace(/\{/g,'${')+'`')
      .replace(/\.replace\(/g,'.replace_py(')
      .replace(/\.split\(\)/g,'.split_py()')
      .replace(/\.pop\(\)/g,'.pop_py()')
      .replace(/\.pop\(([^)]+)\)/g,'.pop_py($1)')
      .replace(/\.sort\(\)/g,'.sort_py()')
      .replace(/def\s+(\w+)\s*\(([^)]*)\)\s*:/g,'function $1($2){')
      // for i, x in enumerate(...) — tuple unpack
      .replace(/^(\s*)for\s+(\w+)\s*,\s*(\w+)\s+in\s+pyEnumerate\(([^)]+)\)\s*:\s*$/gm,'$1for(const [$2,$3] of pyEnumerate($4)){')
      // elif/else tagged so brace-builder merges them with the prior block's close
      .replace(/^(\s*)elif\s+(.+?):\s*$/gm,'$1ELIFMARK($2){')
      .replace(/^(\s*)else\s*:\s*$/gm,'$1ELSEMARK{')
      .replace(/^(\s*)if\s+(.+?):\s*$/gm,'$1if($2){')
      .replace(/^(\s*)while\s+(.+?):\s*$/gm,'$1while($2){')
      .replace(/^(\s*)for\s+(\w+)\s+in\s+pyRange\s*\(([^)]+)\)\s*:\s*$/gm,(m,ind,v,args)=>{
        const parts=args.split(',').map(s=>s.trim());
        if(parts.length===1) return `${ind}for(let ${v}=0; ${v}<${parts[0]}; ${v}++){`;
        if(parts.length===2) return `${ind}for(let ${v}=${parts[0]}; ${v}<${parts[1]}; ${v}++){`;
        return `${ind}for(let ${v}=${parts[0]}; ${parts[2]}>0 ? ${v}<${parts[1]} : ${v}>${parts[1]}; ${v}+=${parts[2]}){`;
      })
      .replace(/^(\s*)for\s+(\w+)\s+in\s+(\w+)\s*:\s*$/gm,'$1for(const $2 of $3){')
      .replace(/\band\b/g,'&&').replace(/\bor\b/g,'||').replace(/\bnot\s+/g,'!')
      .replace(/(\w+(?:\([^)]*\))?(?:\.\w+(?:\([^)]*\))?)*)\s+FLOORDIV\s+(\w+(?:\([^)]*\))?(?:\.\w+(?:\([^)]*\))?)*)/g,'Math.floor($1/$2)');

    // Convert Python indentation into braces. elif/else lines REUSE the
    // previous block's closing brace (so "} else if(...) {" reads correctly)
    // instead of producing an extra stray '}'.
    const lines=code.split('\n');
    const out2=[]; const stack=[];
    for(let line of lines){
      const indent=(line.match(/^(\s*)/)||['',''])[1].length;
      const trimmed=line.trim();
      if(trimmed===''){ out2.push(line); continue; }

      const isElifElse=/^ELIFMARK\(|^ELSEMARK\{/.test(trimmed);
      if(isElifElse){
        if(stack.length && indent===stack[stack.length-1]) stack.pop();
        const fixed=line.replace('ELIFMARK(','} else if(').replace('ELSEMARK{','} else {');
        stack.push(indent);
        out2.push(fixed);
        continue;
      }

      while(stack.length && indent<=stack[stack.length-1]){
        out2.push('}'); stack.pop();
      }
      if(/\{\s*$/.test(trimmed)) stack.push(indent);
      out2.push(line);
    }
    while(stack.length){ out2.push('}'); stack.pop(); }
    code=out2.join('\n');

    // Run with all py-helpers explicitly injected as parameters
    const fn=new Function('pyLen','pyRange','pyInt','pyFloat','pyStr','pyEnumerate','console', code);
    fn(pyLen, pyRange, pyInt, pyFloat, pyStr, pyEnumerate, fakeConsole);
    out.textContent=logs.join('\n')||'(no output — add print() to see results)';
    out.classList.add('ok');
  } catch(e) {
    let msg=e.message;
    if(msg.includes('Unexpected token') || msg.includes('Unexpected identifier')){
      msg='Syntax error — check your indentation and colons. This editor supports basic Python (variables, print, loops, if/else, functions, lists, strings), but very advanced code may need a real Python environment.';
    }
    out.textContent='⚠️ '+msg;
    out.classList.add('err');
  }
}

function markDone(idx){
  const d=DAYS[idx];
  if(!daysDone.has(d.day)){
    daysDone.add(d.day);
    addXP(d.mins);
    if(d.day===currentDay&&currentDay<60) currentDay++;
    updateTopBar();
    openDay(idx);
    showToast('🎉 Day '+d.day+' complete! +'+d.mins+' XP earned!');
  }
}

// ── QUIZ — Fixed: no recursive goSec calls ──
function startQuiz(dayIdx){
  if(typeof dayIdx==='undefined'||dayIdx<0||dayIdx>=DAYS.length) dayIdx=currentDay-1;
  quizState={dayIdx,qi:0,correct:0,firstPick:true,answered:false};
  renderQuestion();
  // Switch section directly without triggering nav renderers
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-quiz').classList.add('on');
}

function renderQuestion(){
  const d=DAYS[quizState.dayIdx];
  const q=d.questions[quizState.qi];
  const total=d.questions.length;
  const pct=Math.round(quizState.qi/total*100);
  const letters=['A','B','C','D'];

  let optsHtml='';
  if(q.type==='tf'){
    optsHtml=`<div class="tf-row">
      <button class="opt-btn" id="qopt-0" onclick="pickAnswer(0)">
        <span class="opt-letter">T</span>True
      </button>
      <button class="opt-btn" id="qopt-1" onclick="pickAnswer(1)">
        <span class="opt-letter">F</span>False
      </button>
    </div>`;
  } else {
    optsHtml=`<div class="opts-list">${(q.opts||[]).map((o,i)=>`
      <button class="opt-btn" id="qopt-${i}" onclick="pickAnswer(${i})">
        <span class="opt-letter">${letters[i]}</span>${escHtml(String(o))}
      </button>`).join('')}</div>`;
  }

  document.getElementById('sec-quiz').innerHTML=`
    <div class="quiz-topbar">
      <button class="quiz-back-btn" onclick="openDay(${quizState.dayIdx})">← Lesson</button>
      <span class="quiz-counter">Q${quizState.qi+1} / ${total} &nbsp;·&nbsp; ${d.title}</span>
      <span class="quiz-score-pill">✅ ${quizState.correct}</span>
    </div>
    <div class="quiz-progress-bar">
      <div class="quiz-progress-fill" style="width:${pct}%"></div>
    </div>
    <div class="quiz-body">
      <div class="quiz-question">${fmtQuestion(q.q)}</div>
      ${optsHtml}
      <div class="feedback-box" id="qfb"></div>
      <button class="next-btn" id="qnext" onclick="nextQuestion()">
        ${quizState.qi+1<total?'Next Question →':'🏁 See My Results'}
      </button>
    </div>`;
}

function fmtQuestion(t){
  return escHtml(t).replace(/`([^`]+)`/g,'<code>$1</code>');
}

function pickAnswer(i){
  if(quizState.answered) return;
  const d=DAYS[quizState.dayIdx];
  const q=d.questions[quizState.qi];
  const correctIdx=q.type==='tf'?(q.ans===true?0:1):q.ans;
  const isRight=(i===correctIdx);
  const fb=document.getElementById('qfb');

  if(isRight){
    document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
    document.getElementById('qopt-'+i).classList.add('correct');
    quizState.answered=true;
    if(quizState.firstPick){
      quizState.correct++;
      fb.className='feedback-box ok';
      fb.innerHTML='<strong>✅ Correct!</strong> '+escHtml(q.exp);
    } else {
      fb.className='feedback-box ok';
      fb.innerHTML='<strong>Found it!</strong> '+escHtml(q.exp);
    }
    document.getElementById('qnext').style.display='block';
  } else {
    // Mark wrong, highlight correct, let them tap it
    document.getElementById('qopt-'+i).classList.add('wrong');
    document.getElementById('qopt-'+i).disabled=true;
    quizState.firstPick=false;
    // Highlight correct answer
    const correctBtn=document.getElementById('qopt-'+correctIdx);
    if(correctBtn){ correctBtn.classList.add('highlight'); correctBtn.disabled=false; }
    fb.className='feedback-box bad';
    fb.innerHTML='<strong>Not quite!</strong> The highlighted answer is correct — tap it to continue.';
    // Re-enable other buttons except wrong one
    document.querySelectorAll('.opt-btn').forEach((b,bi)=>{
      if(bi!==i&&bi!==correctIdx) b.disabled=false;
    });
    // Override correct button click to advance
    if(correctBtn){
      correctBtn.onclick=()=>{
        document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
        quizState.answered=true;
        fb.className='feedback-box ok';
        fb.innerHTML='<strong>Got it!</strong> '+escHtml(q.exp);
        document.getElementById('qnext').style.display='block';
      };
    }
  }
}

function nextQuestion(){
  if(!quizState.answered) return;
  quizState.qi++;
  quizState.firstPick=true;
  quizState.answered=false;
  const total=DAYS[quizState.dayIdx].questions.length;
  if(quizState.qi>=total) showQuizResult();
  else renderQuestion();
}

function showQuizResult(){
  const d=DAYS[quizState.dayIdx];
  const total=d.questions.length;
  const correct=quizState.correct;
  const pct=Math.round(correct/total*100);
  const stars=pct===100?3:pct>=80?2:1;
  const xpEarned=stars===3?50:stars===2?35:20;
  const passed=pct===100;

  if(passed){ level++; addXP(xpEarned); } else addXP(xpEarned);
  daysDone.add(d.day);
  if(d.day===currentDay&&currentDay<60) currentDay++;
  updateTopBar(); saveState();

  const trophy=passed?'🏆':pct>=80?'🥇':pct>=60?'🥈':'🥉';
  const msg=passed?'Perfect Score!':pct>=80?'Outstanding!':pct>=60?'Great Work!':'Keep Practising!';
  const starStr='⭐'.repeat(stars)+'☆'.repeat(3-stars);

  document.getElementById('sec-quiz').innerHTML=`
    <div class="quiz-result-screen">
      <div class="quiz-trophy">${trophy}</div>
      <div class="quiz-stars">${starStr}</div>
      <div class="quiz-result-title">${msg}</div>
      <div class="quiz-result-sub">
        Day ${d.day}: ${d.title}<br>
        <strong>+${xpEarned} XP earned!</strong>${passed?' You levelled up!':''}
      </div>
      <div class="result-stats-row">
        <div class="rs"><span class="rs-val">${correct}/${total}</span><span class="rs-lbl">Correct</span></div>
        <div class="rs"><span class="rs-val">${pct}%</span><span class="rs-lbl">Score</span></div>
        <div class="rs"><span class="rs-val">+${xpEarned}</span><span class="rs-lbl">XP</span></div>
      </div>
      <button class="btn-retry" onclick="startQuiz(${quizState.dayIdx})">🔄 Try Again</button>
      ${quizState.dayIdx+1<DAYS.length
        ? `<button class="btn-next-day" onclick="openDay(${quizState.dayIdx+1})">Next Lesson →</button>`
        : `<button class="btn-next-day" onclick="goSec('home')">🏠 Back Home</button>`}
    </div>`;
}

  const lvlName=l=>l==='beg'?'Beginner':l==='int'?'Intermediate':'Advanced';
  const lvlCls=l=>l==='beg'?'lvl-beg':l==='int'?'lvl-int':'lvl-adv';
  document.getElementById('sec-challenges').innerHTML=`
    <div class="challenges-wrap">
      <div class="section-eyebrow">Coding Challenges</div>
      <div style="background:var(--gold-light);border:1.5px solid var(--gold);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--gold-dark);margin-bottom:14px;font-weight:600;line-height:1.6">
        💡 Build these projects in Python on your computer (IDLE, VS Code, or Replit). Tap "Show hint" if you need a nudge, or ask the AI tutor!
      </div>
      ${CHALLENGES.map((c,i)=>`
      <div class="chal-card">
        <span class="lvl-badge ${lvlCls(c.level)}">${lvlName(c.level)}</span>

        <p>${c.desc}</p>
        <button class="hint-toggle" onclick="toggleHint(${i})">💡 Show hint</button>
        <div class="hint-box" id="chint-${i}">${c.hint}</div>

          <button class="btn-secondary" onclick="askChallenge('${escAttr(c.title)}')">Ask AI for help ↗</button>

function toggleHint(i){
  const h=document.getElementById('chint-'+i);
  if(h) h.style.display=h.style.display==='none'?'block':'none';
}

// ── ASK AI ──
const PY_TOPICS=[
  'Variables','Strings','f-strings','If / else','For loops','While loops',
  'Lists','Tuples','Dictionaries','Functions','Classes','Inheritance',
  'List comprehensions','File handling','Error handling','Modules',
  'Recursion','Decorators','Generators','Lambda functions'
];

function renderAsk(){
  document.getElementById('sec-ask').innerHTML=`
    <div class="ask-wrap">
      <div class="ask-hero">
        <div class="ask-hero-icon">🤖</div>
        <h2>AI Python Tutor</h2>
        <p>Ask any Python question — get a clear, friendly answer!</p>
      </div>
      <div class="topic-grid">
        ${PY_TOPICS.slice(0,18).map(t=>`<div class="topic-chip" onclick="setTopic('${escAttr(t)}')">${t}</div>`).join('')}
      </div>
      <div class="ask-label">Your question</div>
      <textarea class="ask-textarea" id="ask-input" rows="3" placeholder="e.g. 'What is the difference between a list and a tuple?' or 'How do I use a for loop?'"></textarea>
      <button class="btn-ask" onclick="askAI()">🚀 Ask My Tutor</button>
      <div class="ai-response-box" id="ai-box">
        <div class="ai-label">🤖 AI Tutor says:</div>
        <div class="ai-text" id="ai-text"></div>
      </div>
    </div>`;
}

function setTopic(t){
  const el=document.getElementById('ask-input');
  if(el) el.value=`Can you explain "${t}" in Python with a simple example? I'm 13 and a beginner.`;
}
function askAboutDay(title){
  goSec('ask');
  const el=document.getElementById('ask-input');
  if(el) el.value=`Can you explain "${title}" in Python more clearly with another example for a 13-year-old?`;
  askAI();
}
function askChallenge(title){
  goSec('ask');
  const el=document.getElementById('ask-input');
  if(el) el.value=`Give me a hint (not the full answer) for the Python challenge: "${title}". I'm 13.`;
  askAI();
}

async function askAI(){
  const q=(document.getElementById('ask-input')?.value||'').trim();
  if(!q) return;
  const box=document.getElementById('ai-box');
  const txt=document.getElementById('ai-text');
  if(box) box.style.display='block';
  if(txt){ txt.innerHTML='<span style="color:var(--brand);font-weight:700">🤔 Thinking…</span>'; }
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:800,
        system:'You are a friendly Python tutor for Mahi, a 13-year-old beginner. Explain simply, use fun analogies, always include a short runnable code example. Keep answers under 200 words. Use occasional emojis. Never use jargon without explaining it.',
        messages:[{role:'user',content:q}]
      })
    });
    const data=await res.json();
    const ans=data.content?.find(b=>b.type==='text')?.text||'Could not get an answer. Try again!';
    if(txt) txt.innerHTML=ans
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>')
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
      .replace(/`([^`]+)`/g,'<code style="background:var(--brand-light);padding:2px 6px;border-radius:5px;font-family:var(--mono);font-size:12px">$1</code>');
  }catch(e){
    if(txt) txt.textContent='Could not reach the AI tutor. Check your internet connection.';
  }
}

// ── UTILS ──
function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s){ return String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// ── BOOT ──
updateTopBar();
renderHome();
</script>
